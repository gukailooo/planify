<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Планировщик задач</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1220; --surface:#171C2E; --surface-2:#202641; --line:#262D4A;
  --text:#EDF0FA; --muted:#8A93B2; --accent:#FFB454; --accent-soft:rgba(255,180,84,.14);
  --teal:#5EEAD4; --teal-soft:rgba(94,234,212,.12); --danger:#FF6B81;
  --radius:18px; --nav-h:64px;
}
body.tg-light{
  --bg:#F2F4FA; --surface:#FFFFFF; --surface-2:#EDF0F8; --line:#E2E6F0;
  --text:#171C2E; --muted:#6B7391; --accent:#E8930C; --accent-soft:rgba(232,147,12,.12);
  --teal:#0FA98E; --teal-soft:rgba(15,169,142,.1); --danger:#E5484D;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Manrope',system-ui,sans-serif; background:var(--bg); color:var(--text);
  overscroll-behavior:none; user-select:none; -webkit-user-select:none;
}
.app{max-width:520px;margin:0 auto;min-height:100%;padding:16px 16px calc(var(--nav-h) + 28px);}
h1,h2,.num{font-family:'Unbounded',sans-serif}

/* ---------- Header ---------- */
.header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:6px 2px 18px}
.header .date{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.header h1{font-size:21px;font-weight:600;margin-top:5px;line-height:1.2}
.ring{position:relative;width:64px;height:64px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .track{stroke:var(--surface-2)}
.ring .bar{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:'Unbounded';font-size:13px;font-weight:600}

/* ---------- Sections & tasks ---------- */
.section{margin-bottom:20px}
.section-head{display:flex;align-items:center;gap:8px;margin:0 2px 10px}
.section-head .label{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.section-head .count{font-size:11px;font-weight:700;background:var(--surface-2);color:var(--muted);padding:2px 8px;border-radius:99px}
.section-head.overdue .label{color:var(--danger)}
.task{
  display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:8px;
  animation:pop .25s cubic-bezier(.22,1,.36,1);
}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.task.done{opacity:.55}
.task.done .title{text-decoration:line-through;color:var(--muted)}
.check{
  width:26px;height:26px;flex:none;border-radius:9px;border:2px solid var(--muted);
  display:grid;place-items:center;transition:all .18s;cursor:pointer;background:transparent;color:transparent;
}
.task.done .check{background:var(--teal);border-color:var(--teal);color:#06251F}
.task .body{flex:1;min-width:0;cursor:pointer}
.task .title{font-size:15px;font-weight:600;line-height:1.35;word-wrap:break-word}
.task .meta{display:flex;gap:8px;align-items:center;margin-top:4px;font-size:12px;color:var(--muted);font-weight:600;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.p-high{background:var(--danger)} .p-mid{background:var(--accent)} .p-low{background:var(--teal)}
.empty{
  text-align:center;padding:52px 20px;color:var(--muted);
}
.empty .emo{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;font-weight:600;line-height:1.5}

/* ---------- FAB ---------- */
.fab{
  position:fixed;right:calc(50% - 260px + 16px);bottom:calc(var(--nav-h) + 20px);
  width:56px;height:56px;border-radius:19px;border:none;background:var(--accent);color:#241500;
  font-size:28px;line-height:1;display:grid;place-items:center;cursor:pointer;z-index:30;
  box-shadow:0 10px 26px rgba(255,180,84,.35);transition:transform .15s;
}
@media(max-width:552px){.fab{right:16px}}
.fab:active{transform:scale(.92)}

/* ---------- Bottom nav ---------- */
.nav{
  position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);z-index:20;
  background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;
  padding:8px max(16px,env(safe-area-inset-left)) max(8px,env(safe-area-inset-bottom));
}
.nav button{
  flex:1;max-width:170px;border:none;background:transparent;color:var(--muted);border-radius:14px;
  font-family:'Manrope';font-size:12px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;transition:.15s;
}
.nav button svg{width:22px;height:22px}
.nav button.active{color:var(--accent);background:var(--accent-soft)}

/* ---------- Sheet (add / edit) ---------- */
.scrim{position:fixed;inset:0;background:rgba(5,7,15,.55);opacity:0;pointer-events:none;transition:.25s;z-index:40}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:520px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;padding:10px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .3s cubic-bezier(.22,1,.36,1);
}
.sheet.open{transform:none}
.grip{width:40px;height:4px;border-radius:99px;background:var(--line);margin:4px auto 16px}
.sheet h2{font-size:16px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input[type=text],.field input[type=date]{
  width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
  padding:13px 14px;color:var(--text);font-family:'Manrope';font-size:15px;font-weight:600;outline:none;
  color-scheme:dark;
}
body.tg-light .field input{color-scheme:light}
.field input:focus{border-color:var(--accent)}
.chips{display:flex;gap:8px}
.chip{
  flex:1;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);
  border-radius:12px;padding:10px 0;font-family:'Manrope';font-size:13px;font-weight:800;cursor:pointer;transition:.15s;
}
.chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.chip.on.c-high{border-color:var(--danger);background:rgba(255,107,129,.12);color:var(--danger)}
.chip.on.c-low{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
.sheet-actions{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;border:none;border-radius:14px;padding:15px 0;font-family:'Manrope';font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#241500}
.btn.ghost{background:var(--surface-2);color:var(--text)}
.btn.danger{background:rgba(255,107,129,.14);color:var(--danger);flex:0 0 54px}

/* ---------- Stats ---------- */
.seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:16px}
.seg button{
  flex:1;border:none;background:transparent;color:var(--muted);border-radius:10px;padding:9px 0;
  font-family:'Manrope';font-size:13px;font-weight:800;cursor:pointer;transition:.15s;
}
.seg button.active{background:var(--accent);color:#241500}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 12px}
.card .num{font-size:22px;font-weight:600;color:var(--accent)}
.card:nth-child(2) .num{color:var(--teal)}
.card .lbl{font-size:11px;font-weight:700;color:var(--muted);margin-top:5px;line-height:1.3}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.panel h2{font-size:13px;font-weight:600;margin-bottom:14px}
.chart{display:flex;align-items:flex-end;gap:6px;height:130px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.col .bar-wrap{width:100%;height:100px;display:flex;align-items:flex-end;justify-content:center}
.col .bar{
  width:min(100%,26px);border-radius:7px 7px 3px 3px;background:var(--accent);
  min-height:3px;transform-origin:bottom;animation:grow .5s cubic-bezier(.22,1,.36,1);
}
@keyframes grow{from{transform:scaleY(0)}}
.col .bar.zero{background:var(--surface-2)}
.col .bar.today{background:var(--teal)}
.col .cap{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.col .val{font-size:11px;font-weight:800;color:var(--text)}
.heat{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px;overflow-x:auto;padding-bottom:4px}
.cell{width:11px;height:11px;border-radius:3px;background:var(--surface-2);flex:none}
.cell.l1{background:color-mix(in srgb,var(--teal) 30%,var(--surface-2))}
.cell.l2{background:color-mix(in srgb,var(--teal) 60%,var(--surface-2))}
.cell.l3{background:var(--teal)}
.heat-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:10px;font-size:10px;font-weight:700;color:var(--muted)}
.screen{display:none}.screen.on{display:block}
.toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 90px);transform:translateX(-50%) translateY(10px);
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:99px;opacity:0;transition:.25s;z-index:60;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%)}
</style>
</head>
<body>
<div class="app">

  <!-- ===== Задачи ===== -->
  <div class="screen on" id="screen-tasks">
    <div class="header">
      <div>
        <div class="date" id="today-label"></div>
        <h1 id="greeting">Мои задачи</h1>
      </div>
      <div class="ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="track" cx="32" cy="32" r="27" fill="none" stroke-width="6"/>
          <circle class="bar" id="ring-bar" cx="32" cy="32" r="27" fill="none" stroke-width="6"
                  stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
        </svg>
        <div class="pct" id="ring-pct">0%</div>
      </div>
    </div>
    <div id="task-lists"></div>
  </div>

  <!-- ===== Статистика ===== -->
  <div class="screen" id="screen-stats">
    <div class="header"><div><div class="date">Прогресс</div><h1>Статистика</h1></div></div>
    <div class="seg" id="seg">
      <button data-p="week" class="active">Неделя</button>
      <button data-p="month">Месяц</button>
      <button data-p="year">Год</button>
    </div>
    <div class="cards" id="stat-cards"></div>
    <div class="panel">
      <h2 id="chart-title"></h2>
      <div class="chart" id="chart"></div>
    </div>
    <div class="panel" id="heat-panel" style="display:none">
      <h2>Карта активности · 12 месяцев</h2>
      <div class="heat" id="heat"></div>
      <div class="heat-legend">Меньше
        <span class="cell"></span><span class="cell l1"></span><span class="cell l2"></span><span class="cell l3"></span>
      Больше</div>
    </div>
  </div>
</div>

<button class="fab" id="fab" aria-label="Добавить задачу">+</button>

<nav class="nav">
  <button id="nav-tasks" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Задачи
  </button>
  <button id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    Статистика
  </button>
</nav>

<!-- ===== Шторка добавления/редактирования ===== -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h2 id="sheet-title">Новая задача</h2>
  <div class="field">
    <label>Что нужно сделать</label>
    <input type="text" id="f-title" maxlength="120" placeholder="Например: подготовить отчёт" enterkeyhint="done">
  </div>
  <div class="field">
    <label>Дата</label>
    <input type="date" id="f-date">
  </div>
  <div class="field">
    <label>Приоритет</label>
    <div class="chips" id="prio">
      <button class="chip c-low" data-v="low">Низкий</button>
      <button class="chip on" data-v="mid">Средний</button>
      <button class="chip c-high" data-v="high">Высокий</button>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn danger" id="btn-del" style="display:none" aria-label="Удалить">🗑</button>
    <button class="btn ghost" id="btn-cancel">Отмена</button>
    <button class="btn primary" id="btn-save">Сохранить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= Telegram init ================= */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  if (tg.colorScheme === 'light') document.body.classList.add('tg-light');
  tg.onEvent('themeChanged', () => document.body.classList.toggle('tg-light', tg.colorScheme === 'light'));
}
const haptic = t => { try { tg?.HapticFeedback?.impactOccurred(t || 'light'); } catch(e){} };

/* ================= Хранилище ================= */
const KEY = 'planner_tasks_v1';
let memStore = null;
function lsGet(){ try { return localStorage.getItem(KEY); } catch(e){ return memStore; } }
function lsSet(v){ try { localStorage.setItem(KEY, v); } catch(e){ memStore = v; } }
function cloudSave(json){ // best-effort синхронизация в Telegram CloudStorage (чанками по 3800 символов)
  const cs = tg?.CloudStorage; if (!cs) return;
  try {
    const chunks = json.match(/[\s\S]{1,3800}/g) || [''];
    cs.setItem(KEY + '_n', String(chunks.length), ()=>{});
    chunks.forEach((c,i)=>cs.setItem(KEY + '_' + i, c, ()=>{}));
  } catch(e){}
}
function cloudLoad(cb){
  const cs = tg?.CloudStorage; if (!cs) return cb(null);
  try {
    cs.getItem(KEY + '_n', (err,n)=>{
      if (err || !n) return cb(null);
      const keys = Array.from({length:+n},(_,i)=>KEY+'_'+i);
      cs.getItems(keys,(e2,vals)=>{
        if (e2 || !vals) return cb(null);
        cb(keys.map(k=>vals[k]||'').join(''));
      });
    });
  } catch(e){ cb(null); }
}

/* --- синхронизация с сервером (источник истины, когда доступен) --- */
const initData = tg?.initData || '';
let apiOk = false, apiTimer = null;
async function apiLoad(){
  if (!initData) return null;
  try {
    const r = await fetch('/api/tasks', { headers: { 'X-Init-Data': initData } });
    if (!r.ok) return null;
    apiOk = true;
    return await r.json();
  } catch(e){ return null; }
}
function apiSave(){
  if (!initData || !apiOk) return;
  clearTimeout(apiTimer);
  apiTimer = setTimeout(()=>{
    fetch('/api/tasks', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData },
      body: JSON.stringify(tasks)
    }).catch(()=>{});
  }, 400);
}

let tasks = [];
function load(){
  const raw = lsGet();
  if (raw) { try { tasks = JSON.parse(raw) || []; } catch(e){ tasks = []; } }
  // сервер — главный источник; локальные копии — офлайн-кэш
  apiLoad().then(server => {
    if (server) { tasks = server; lsSet(JSON.stringify(tasks)); renderAll(); return; }
    cloudLoad(json => {
      if (json) { try {
        const cloud = JSON.parse(json);
        if (Array.isArray(cloud) && cloud.length > tasks.length) { tasks = cloud; renderAll(); }
      } catch(e){} }
    });
  });
}
function save(){
  const json = JSON.stringify(tasks);
  lsSet(json); cloudSave(json); apiSave();
}

/* ================= Даты ================= */
const iso = d => { const x = new Date(d); x.setMinutes(x.getMinutes()-x.getTimezoneOffset()); return x.toISOString().slice(0,10); };
const todayISO = () => iso(new Date());
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_S = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const DAYS_S = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
function fmtHuman(d){
  const t = todayISO();
  if (d === t) return 'Сегодня';
  const tm = iso(new Date(Date.now()+864e5));
  if (d === tm) return 'Завтра';
  const [y,m,dd] = d.split('-');
  return `${+dd} ${MONTHS[+m-1]}`;
}
function plural(n, one, few, many){
  const a = n%10, b = n%100;
  if (a===1 && b!==11) return one;
  if (a>=2 && a<=4 && (b<10||b>=20)) return few;
  return many;
}

/* ================= Задачи: рендер ================= */
const PRIO_NAME = {high:'Высокий', mid:'Средний', low:'Низкий'};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

function taskHTML(t){
  return `<div class="task ${t.done?'done':''}" data-id="${t.id}">
    <button class="check" aria-label="Выполнено">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
    <div class="body">
      <div class="title"></div>
      <div class="meta"><span class="dot p-${t.prio}"></span>${PRIO_NAME[t.prio]} · ${fmtHuman(t.date)}</div>
    </div>
  </div>`;
}
function sectionHTML(label, list, cls){
  if (!list.length) return '';
  return `<div class="section">
    <div class="section-head ${cls||''}"><span class="label">${label}</span><span class="count">${list.length}</span></div>
    ${list.map(taskHTML).join('')}
  </div>`;
}
function renderTasks(){
  const t = todayISO();
  const active = tasks.filter(x=>!x.done);
  const overdue = active.filter(x=>x.date < t).sort((a,b)=>a.date.localeCompare(b.date));
  const today   = active.filter(x=>x.date === t);
  const later   = active.filter(x=>x.date > t).sort((a,b)=>a.date.localeCompare(b.date));
  const doneToday = tasks.filter(x=>x.done && x.completedAt && x.completedAt.slice(0,10)===t);

  const box = document.getElementById('task-lists');
  let html = sectionHTML('Просрочено', overdue, 'overdue')
           + sectionHTML('Сегодня', today)
           + sectionHTML('Предстоящие', later)
           + sectionHTML('Выполнено сегодня', doneToday);
  if (!html) html = `<div class="empty"><div class="emo">🌿</div><p>Пока пусто.<br>Нажмите «+», чтобы добавить первую задачу.</p></div>`;
  box.innerHTML = html;

  // безопасно подставляем названия текстом
  box.querySelectorAll('.task').forEach(el=>{
    const task = tasks.find(x=>x.id===el.dataset.id);
    if (task) el.querySelector('.title').textContent = task.title;
  });

  // кольцо дня
  const total = today.length + overdue.length + doneToday.length;
  const pct = total ? Math.round(doneToday.length/total*100) : 0;
  const C = 169.6;
  document.getElementById('ring-bar').style.strokeDashoffset = C - C*pct/100;
  document.getElementById('ring-pct').textContent = pct + '%';
}

/* ================= Действия ================= */
document.getElementById('task-lists').addEventListener('click', e=>{
  const el = e.target.closest('.task'); if (!el) return;
  const task = tasks.find(x=>x.id===el.dataset.id); if (!task) return;
  if (e.target.closest('.check')) {
    task.done = !task.done;
    task.completedAt = task.done ? new Date().toISOString() : null;
    haptic(task.done ? 'medium' : 'light');
    if (task.done) toast('Задача выполнена ✓');
    save(); renderAll();
  } else {
    openSheet(task);
  }
});

/* ================= Шторка ================= */
const sheet = document.getElementById('sheet'), scrim = document.getElementById('scrim');
let editId = null, prio = 'mid';
function openSheet(task){
  editId = task ? task.id : null;
  document.getElementById('sheet-title').textContent = task ? 'Редактировать' : 'Новая задача';
  document.getElementById('f-title').value = task ? task.title : '';
  document.getElementById('f-date').value = task ? task.date : todayISO();
  setPrio(task ? task.prio : 'mid');
  document.getElementById('btn-del').style.display = task ? 'block' : 'none';
  sheet.classList.add('open'); scrim.classList.add('open');
  if (!task) setTimeout(()=>document.getElementById('f-title').focus(), 320);
  haptic('light');
}
function closeSheet(){ sheet.classList.remove('open'); scrim.classList.remove('open'); }
function setPrio(v){
  prio = v;
  document.querySelectorAll('#prio .chip').forEach(c=>c.classList.toggle('on', c.dataset.v===v));
}
document.getElementById('prio').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if (c){ setPrio(c.dataset.v); haptic('light'); }
});
document.getElementById('fab').onclick = ()=>openSheet(null);
document.getElementById('btn-cancel').onclick = closeSheet;
scrim.onclick = closeSheet;
document.getElementById('f-title').addEventListener('keydown', e=>{ if (e.key==='Enter') document.getElementById('btn-save').click(); });

document.getElementById('btn-save').onclick = ()=>{
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Введите название задачи'); haptic('heavy'); return; }
  const date = document.getElementById('f-date').value || todayISO();
  if (editId) {
    const t = tasks.find(x=>x.id===editId);
    if (t) Object.assign(t, {title, date, prio});
  } else {
    tasks.unshift({id:uid(), title, date, prio, done:false, createdAt:new Date().toISOString(), completedAt:null});
  }
  save(); renderAll(); closeSheet(); haptic('medium');
};
document.getElementById('btn-del').onclick = ()=>{
  tasks = tasks.filter(x=>x.id!==editId);
  save(); renderAll(); closeSheet(); toast('Задача удалена'); haptic('medium');
};

/* ================= Навигация ================= */
const navT = document.getElementById('nav-tasks'), navS = document.getElementById('nav-stats');
function show(screen){
  document.getElementById('screen-tasks').classList.toggle('on', screen==='tasks');
  document.getElementById('screen-stats').classList.toggle('on', screen==='stats');
  navT.classList.toggle('active', screen==='tasks');
  navS.classList.toggle('active', screen==='stats');
  document.getElementById('fab').style.display = screen==='tasks' ? 'grid' : 'none';
  if (screen==='stats') renderStats();
  haptic('light');
  window.scrollTo({top:0});
}
navT.onclick = ()=>show('tasks');
navS.onclick = ()=>show('stats');

/* ================= Статистика ================= */
let period = 'week';
document.getElementById('seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if (!b) return;
  period = b.dataset.p;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('active', x===b));
  renderStats(); haptic('light');
});

function completedByDay(){
  const map = {};
  tasks.forEach(t=>{
    if (t.done && t.completedAt) {
      const d = t.completedAt.slice(0,10);
      map[d] = (map[d]||0)+1;
    }
  });
  return map;
}
function streak(map){
  let s = 0; const d = new Date();
  if (!map[iso(d)]) d.setDate(d.getDate()-1); // серия не рвётся, если сегодня ещё ничего не сделано
  while (map[iso(d)]) { s++; d.setDate(d.getDate()-1); }
  return s;
}

function renderStats(){
  const map = completedByDay();
  const now = new Date();
  let bars = [], title = '', rangeDone = 0, rangeCreated = 0;

  const createdInRange = from => tasks.filter(t => new Date(t.createdAt||t.date) >= from).length;
  const doneInRange = from => tasks.filter(t => t.done && t.completedAt && new Date(t.completedAt) >= from).length;

  if (period === 'week') {
    title = 'Выполнено за последние 7 дней';
    for (let i=6;i>=0;i--){
      const d = new Date(now); d.setDate(d.getDate()-i);
      const k = iso(d);
      bars.push({cap:DAYS_S[(d.getDay()+6)%7], val:map[k]||0, today:i===0});
    }
    const from = new Date(now); from.setDate(from.getDate()-6); from.setHours(0,0,0,0);
    rangeDone = doneInRange(from); rangeCreated = createdInRange(from);
  }
  else if (period === 'month') {
    title = 'Выполнено за 4 недели';
    for (let w=3;w>=0;w--){
      const end = new Date(now); end.setDate(end.getDate()-w*7);
      let sum = 0;
      for (let i=0;i<7;i++){ const d=new Date(end); d.setDate(d.getDate()-i); sum += map[iso(d)]||0; }
      const s = new Date(end); s.setDate(s.getDate()-6);
      bars.push({cap:`${s.getDate()}–${end.getDate()}`, val:sum, today:w===0});
    }
    const from = new Date(now); from.setDate(from.getDate()-27); from.setHours(0,0,0,0);
    rangeDone = doneInRange(from); rangeCreated = createdInRange(from);
  }
  else {
    title = 'Выполнено по месяцам';
    for (let i=11;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const pref = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      let sum = 0;
      Object.keys(map).forEach(k=>{ if (k.startsWith(pref)) sum += map[k]; });
      bars.push({cap:MONTHS_S[d.getMonth()], val:sum, today:i===0});
    }
    const from = new Date(now.getFullYear(), now.getMonth()-11, 1);
    rangeDone = doneInRange(from); rangeCreated = createdInRange(from);
  }

  // карточки
  const st = streak(map);
  const rate = rangeCreated ? Math.min(100, Math.round(rangeDone/rangeCreated*100)) : (rangeDone ? 100 : 0);
  document.getElementById('stat-cards').innerHTML = `
    <div class="card"><div class="num">${rangeDone}</div><div class="lbl">${plural(rangeDone,'задача выполнена','задачи выполнены','задач выполнено')}</div></div>
    <div class="card"><div class="num">${st}</div><div class="lbl">${plural(st,'день подряд','дня подряд','дней подряд')}</div></div>
    <div class="card"><div class="num">${rate}%</div><div class="lbl">задач закрыто</div></div>`;

  // график
  document.getElementById('chart-title').textContent = title;
  const max = Math.max(1, ...bars.map(b=>b.val));
  document.getElementById('chart').innerHTML = bars.map(b=>`
    <div class="col">
      <div class="val">${b.val||''}</div>
      <div class="bar-wrap"><div class="bar ${b.val?'':'zero'} ${b.today&&b.val?'today':''}" style="height:${Math.max(3, b.val/max*100)}%"></div></div>
      <div class="cap">${b.cap}</div>
    </div>`).join('');

  // тепловая карта за год
  const hp = document.getElementById('heat-panel');
  if (period === 'year') {
    hp.style.display = 'block';
    const cells = [];
    const start = new Date(now); start.setDate(start.getDate()-364);
    start.setDate(start.getDate() - ((start.getDay()+6)%7)); // от понедельника
    const d = new Date(start);
    while (d <= now) {
      const v = map[iso(d)]||0;
      const cls = v===0 ? '' : v<2 ? 'l1' : v<4 ? 'l2' : 'l3';
      cells.push(`<span class="cell ${cls}" title="${iso(d)}: ${v}"></span>`);
      d.setDate(d.getDate()+1);
    }
    document.getElementById('heat').innerHTML = cells.join('');
    requestAnimationFrame(()=>{ const h = document.getElementById('heat'); h.scrollLeft = h.scrollWidth; });
  } else hp.style.display = 'none';
}

/* ================= Прочее ================= */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function renderAll(){ renderTasks(); if (document.getElementById('screen-stats').classList.contains('on')) renderStats(); }

// шапка
(function(){
  const n = new Date();
  document.getElementById('today-label').textContent = `${DAYS_S[(n.getDay()+6)%7]}, ${n.getDate()} ${MONTHS[n.getMonth()]}`;
  const name = tg?.initDataUnsafe?.user?.first_name;
  if (name) document.getElementById('greeting').textContent = `Привет, ${name}!`;
})();

load();
renderAll();
</script>
